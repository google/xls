# Bazel Downloader Configuration
#
# For details on the syntax and behavior of this file, see the official Bazel
# documentation under the --downloader_config flag:
# https://bazel.build/reference/command-line-reference#common_options-flag--downloader_config
#
# NOTE:
# - Patterns matched against URLs should NOT include the scheme.
# - 'rewrite' rules are replacements: matching URLs are replaced by the
#   substitutions (the original URL is dropped from the candidate pool).
# - Multiple matching rewrites are additive (all matching substitutions are
#   tried sequentially).

# Redirect GNU HTTP downloads to the recommended 'ftpmirror.gnu.org' multiplexer
# (which georedirects to HTTPS mirrors) and the official primary HTTPS server.
# Matches both:
# - ftp.gnu.org/pub/gnu/[package]/...
# - ftp.gnu.org/gnu/[package]/...
rewrite ftp.gnu.org/(?:pub/)?gnu/(.*) https://ftpmirror.gnu.org/$1
rewrite ftp.gnu.org/(?:pub/)?gnu/(.*) https://ftp.gnu.org/gnu/$1
